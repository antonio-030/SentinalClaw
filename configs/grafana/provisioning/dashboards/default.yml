# SentinelClaw — Grafana Dashboard-Provisioning
# Lädt Dashboards automatisch aus dem angegebenen Verzeichnis

apiVersion: 1

providers:
  - name: "SentinelClaw"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
