# SentinelClaw — Nginx Reverse-Proxy Konfiguration
# HTTPS-Terminierung, Static-File-Serving und API/WebSocket-Proxy

server {
    listen 80;
    server_name _;

    # HTTP zu HTTPS umleiten
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # SSL-Zertifikate
    ssl_certificate     /etc/ssl/certs/sentinelclaw.crt;
    ssl_certificate_key /etc/ssl/private/sentinelclaw.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security-Header
    add_header X-Frame-Options        "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # Maximale Upload-Groesse
    client_max_body_size 10M;

    # Gzip-Kompression fuer statische Assets
    gzip on;
    gzip_types text/css application/javascript application/json text/plain;
    gzip_min_length 256;

    # Frontend — statische Dateien
    location / {
        root  /var/www/sentinelclaw;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API — Reverse-Proxy zum Backend
    location /api/ {
        proxy_pass         http://api:3001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 360s;
    }

    # WebSocket — Proxy mit Upgrade-Header
    location /ws/ {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # Health-Endpoint — direkt zum Backend
    location /health {
        proxy_pass       http://api:3001;
        proxy_set_header Host $host;
    }
}
