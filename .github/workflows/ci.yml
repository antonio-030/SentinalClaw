name: SentinelClaw CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/

  test-backend:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      # Coverage-Messung mit Mindestschwelle 60%
      - run: pytest tests/unit/ -v --tb=short --cov=src --cov-report=xml --cov-fail-under=60

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd frontend && npm ci && npx tsc --noEmit

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Security-Audits sind blockierend — Pipeline schlägt bei Vulnerabilities fehl
      - run: pip install pip-audit
      - run: pip install -e . && pip-audit
      - run: cd frontend && npm ci && npm audit --audit-level=high

  sast:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Statische Sicherheitsanalyse mit Bandit (Medium+ Severity)
      - run: pip install bandit
      - run: bandit -r src/ -ll -f json -o bandit-report.json || true
      # Report auch bei Findings hochladen, damit Entwickler die Details sehen
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-sast-report
          path: bandit-report.json
      # Separater Lauf der fehlschlägt, wenn kritische Findings existieren
      - run: bandit -r src/ -ll

  docker-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      # Prüfe ob Docker-Dateien geändert wurden
      - name: Docker-Änderungen prüfen
        id: docker-changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^docker/|Dockerfile'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      # Trivy für Container-Schwachstellenscans installieren
      - name: Trivy installieren
        if: steps.docker-changes.outputs.changed == 'true'
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy
      # Sandbox-Image bauen und scannen
      - name: Sandbox-Image scannen
        if: steps.docker-changes.outputs.changed == 'true'
        run: |
          docker build -t sentinelclaw-sandbox:ci -f docker/sandbox/Dockerfile .
          trivy image --severity CRITICAL,HIGH --exit-code 1 sentinelclaw-sandbox:ci
      # MCP-Server-Image bauen und scannen
      - name: MCP-Server-Image scannen
        if: steps.docker-changes.outputs.changed == 'true'
        run: |
          docker build -t sentinelclaw-mcp:ci -f docker/mcp-server/Dockerfile .
          trivy image --severity CRITICAL,HIGH --exit-code 1 sentinelclaw-mcp:ci
